<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <table style="width: 100%; height: 100%" border="1">
      <!-- Your code here -->
		<caption>Student Details</caption>
    <tr>
        <td>

            <!-- Nested Table 1 -->
            <table border="1" width="100%">
                <tr>
                    <th colspan="2">Nested Table 1</th>
                </tr>
                <tr>
                    <td>Row 1</td>
                    <td>Row 2</td>
                </tr>
            </table>

        </td>
        <td>

            <!-- Nested Table 2 -->
            <table border="1" width="100%">
                <tr>
                    <th colspan="2">Nested Table 2</th>
                </tr>
                <tr>
                    <th>Column 1</th>
                    <th>Column 2</th>
                </tr>
                <tr>
                    <td>Data 1</td>
                    <td>Data 2</td>
                </tr>
            </table>

        </td>
    </tr>

    <tr>
        <td>

            <!-- Nested Table 3 (with list) -->
            <table border="1" width="100%">
                <tr>
                    <th>Nested Table 3</th>
                </tr>
                <tr>
                    <td>
                        <ul>
                            <li>List item 1</li>
                            <li>List item 2</li>
                            <li>List item 3</li>
                        </ul>
                    </td>
                </tr>
            </table>

        </td>
        <td>

            <!-- Nested Table 4 (with styled cell) -->
            <table border="1" width="100%">
                <tr>
                    <th>Nested Table 4</th>
                </tr>
                <tr>
                    <td style="background-color:black; color:white; text-align:center;">
                        HTML
                    </td>
                </tr>
            </table>

        </td>
    </tr>
    </table>
  </body>
</html>
